# Serve the built SPA on 8080 (fly.io internal_port). Single-page app: unknown paths fall back to
# index.html. Long-cache the fingerprinted assets, never-cache the HTML entry.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
