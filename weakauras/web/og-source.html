<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  /* capture: render at 1200x630, screenshot, save as web/public/og.png */
  body { width: 1200px; height: 630px; overflow: hidden;
    font-family: -apple-system, "Inter", "Segoe UI", sans-serif;
    background: radial-gradient(120% 140% at 85% -10%, #1c2418 0%, #12140f 45%, #0c0d0a 100%);
    color: #fff; position: relative; }
  .wrap { padding: 78px 0 0 72px; }
  .badge { display: inline-block; border: 2px solid #56ba04; border-radius: 999px;
    padding: 10px 22px; color: #7ddd2a; font-weight: 700; font-size: 21px;
    letter-spacing: 3.5px; }
  h1 { margin-top: 34px; font-size: 108px; font-weight: 800; letter-spacing: -2px; }
  h1 .green { color: #6cd41a; }
  .tag { margin-top: 26px; font-size: 40px; font-weight: 500; color: #e8eae4; line-height: 1.3; width: 560px; }
  .chips { margin-top: 36px; display: flex; gap: 12px; }
  .chip { background: #23261f; border-radius: 10px; padding: 10px 16px;
    font-size: 20px; font-weight: 600; color: #c9ccc2; }
  .url { position: absolute; left: 72px; bottom: 78px; color: #6cd41a; font-weight: 700; font-size: 26px; }
  .panel { position: absolute; right: 40px; top: 115px; width: 460px; height: 400px;
    border-radius: 18px; overflow: hidden; box-shadow: 0 0 0 1px #2a2e26, 0 30px 60px rgba(0,0,0,.5); }
  .panel img { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="badge">CONQUEST OF AZEROTH &middot; ASCENSION</span>
    <h1>Aura<span class="green">forge</span></h1>
    <div class="tag">Ready-to-import WeakAuras for every class</div>
    <div class="chips">
      <span class="chip">Resource bars</span>
      <span class="chip">Cooldowns</span>
      <span class="chip">Procs</span>
      <span class="chip">Buff trackers</span>
    </div>
    <div class="url">auraforge.fly.dev</div>
  </div>
  <div class="panel"><img src="panel.png"></div>
</body>
</html>
